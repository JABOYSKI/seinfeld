<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <meta name="description" content="SEINFELD — a yearly wall-calendar habit tracker. Pick a habit, show up every day, fill the box. Don't break the chain." />
  <title>SEINFELD — don't break the chain</title>
  <link rel="manifest" href="manifest.json" />
  <!-- iOS uses apple-touch-icon for the home-screen icon, not the manifest. -->
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <!-- Favicon: same line-art calendar as the in-app banner, but in brand red
       (#ff5a5f) with a thicker stroke so it stays legible at 16/32 px. -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%23ff5a5f%22 stroke-width=%223%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><rect x=%223%22 y=%225%22 width=%2218%22 height=%2218%22 rx=%222%22/><line x1=%223%22 y1=%2210%22 x2=%2221%22 y2=%2210%22/><line x1=%227%22 y1=%222%22 x2=%227%22 y2=%227%22/><line x1=%2217%22 y1=%222%22 x2=%2217%22 y2=%227%22/></svg>" />

  <!-- Inline theme bootstrap: read stored choice and apply BEFORE first paint
       so we don't flash the wrong theme. Mirrors the pattern in fubzlifts. -->
  <script>
    (function() {
      try {
        var t = localStorage.getItem('seinfeld_theme');
        if (t !== 'light' && t !== 'dark') {
          t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
      window.SEIN_BUILD_TIME = '2026-06-02T00:09:25Z';
    })();
  </script>

  <link rel="stylesheet" href="css/styles.css?v=2026-06-02T00:09:25Z" />
  <!-- animations.css and textures.css are not needed for the splash/auth
       paint, so defer them via the rel=preload "swap-onload" trick. Cuts
       render-blocking weight by ~9 KiB on first paint. -->
  <link rel="preload" href="css/animations.css?v=2026-06-02T00:09:25Z" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="css/animations.css?v=2026-06-02T00:09:25Z" /></noscript>
  <link rel="preload" href="css/textures.css?v=2026-06-02T00:09:25Z" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="css/textures.css?v=2026-06-02T00:09:25Z" /></noscript>
</head>
<body>
  <!-- Boot splash covers the page until JS init completes, so users never see
       a half-painted UI flash before auth state is known. -->
  <div id="bootSplash" class="boot-splash">
    <div class="boot-spinner"></div>
  </div>

  <main>
    <div id="authMount" hidden></div>
    <div id="app" hidden></div>
  </main>

  <script type="module" src="js/app.js?v=2026-06-02T00:09:25Z"></script>

  <!-- Service worker (PWA / offline shell). Failure is non-fatal. -->
  <script>
    if ('serviceWorker' in navigator) {
      // If a controller already exists at load, this tab is an UPDATE candidate:
      // when a freshly-deployed SW activates and claims the page, reload once so
      // the open tab runs the new assets instead of stale in-memory modules.
      // (Guarded so the first-ever install — controller goes null->set — and
      // repeat fires don't trigger a reload loop.)
      if (navigator.serviceWorker.controller) {
        var swReloaded = false;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (swReloaded) return;
          swReloaded = true;
          window.location.reload();
        });
      }
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').then(function (reg) {
          // Proactively check for a freshly-deployed SW so an already-open tab
          // picks up new code without a manual hard-reload: check whenever the
          // tab regains focus, and on a slow heartbeat. When a new SW activates
          // it claims the page -> controllerchange (above) -> one reload.
          var check = function () { reg.update().catch(function(){}); };
          document.addEventListener('visibilitychange', function () {
            if (document.visibilityState === 'visible') check();
          });
          window.addEventListener('focus', check);
          setInterval(check, 60000);
        }).catch(function(){});
      });
    }
  </script>
</body>
</html>
